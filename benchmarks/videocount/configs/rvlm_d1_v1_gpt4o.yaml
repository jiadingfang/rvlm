name: rvlm_d1_v1_gpt4o
description: "RVLM depth=1, counting prompt V1, GPT-4o for both reasoning and VLM"

mode: rvlm

backend: openai
backend_kwargs:
  model_name: gpt-4o
  max_tokens: 1024

vlm_model: gpt-4o

max_depth: 1
max_iterations: 8
max_tokens: 200000

prompt_variant: v1

dataset:
  split: val
  video_cache_dir: /tmp/rvlm_videos

output:
  results_dir: benchmarks/videocount/results
  log_trajectories: true
