name: rvlm_d1_minimal_gpt4o
description: "RVLM depth=1, minimal prompt (model discovers strategy), GPT-4o"

mode: rvlm

backend: openai
backend_kwargs:
  model_name: gpt-4o
  max_tokens: 1024

vlm_model: gpt-4o

max_depth: 1
max_iterations: 8
max_tokens: 200000

prompt_variant: minimal

dataset:
  split: val
  video_cache_dir: /tmp/rvlm_videos

output:
  results_dir: benchmarks/videocount/results
  log_trajectories: true
